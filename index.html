<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rastreador | Filmes, Séries e Animes</title>
</head>
<body>
    <header>
        <h1>Rastreador F S A</h1>
        <nav>
            <a href="#">Meus filmes</a>
            <a href="#">Adicionar novo</a>
        </nav>
    </header>
    <main>
        <section>
            <h2>Adicionar novo título</h2>
            <form>
                <label for="nome">Nome do Título:</label><br>
                <input type="text" name="nome" id="nome" placeholder="Ex: Naruto, Matrix...">
                <label for="categoria">Categoria:</label>
                <select name="categoria" id="categoria">
                    <option value="filmes">Filmes</option>
                    <option value="series">Series</option>
                    <option value="animes">Animes</option>
                </select>
                <button>Salvar</button>
            </form>
        </section>
        <section>
            <h2>Minha Lista</h2>
            <ul>
                <li>Stargate - Série</li>
                <li>Ready Player One - Filme</li>
            </ul>
        </section>
    </main>
    <footer>

    </footer>
</body>
</html>
