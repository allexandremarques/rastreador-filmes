<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rastreador | Filmes, Séries e Animes</title>
    <link rel="stylesheet" href="css/main.css">
</head>

<body>
    <header>
        <h1>Rastreador F S A</h1>
        <nav>
            <a href="#">Meus filmes</a>
            <a href="#">Adicionar novo</a>
        </nav>
    </header>
    <main>
        <section>
            <h2>Adicionar novo título</h2>
            <form id="form-adicionar">
                <label for="nome">Nome do Título:</label>
                <input type="text" name="nome" id="nome" placeholder="Ex: Naruto, Matrix...">
                <label for="categoria">Categoria:</label>
                <select name="categoria" id="categoria">
                    <option value="filmes">Filmes</option>
                    <option value="series">Series</option>
                    <option value="animes">Animes</option>
                </select>
                <button>Salvar</button>
            </form>
        </section>
        <section>
            <h2>Minha Lista</h2>

            <div class="categoria-card">
                <h3>Filmes</h3>
                <ul id="lista-filmes">
                    <li>
                        <span>Ready Player One - Filme</span>
                        <div class="acoes">
                            <button class="btn-remover">Remover</button>
                            <button class="btn-assistido">Assistido</button>
                        </div>
                    </li>
                </ul>
            </div>

            <div class="categoria-card">
                <h3>Séries</h3>
                <ul id="lista-series">
                    <li>
                        <span>Stargate - Série</span>
                        <div class="acoes">
                            <button class="btn-remover">Remover</button>
                            <button class="btn-assistido">Assistido</button>
                        </div>
                    </li>
                </ul>
            </div>

            <div class="categoria-card">
                <h3>Animes</h3>
                <ul id="lista-animes">
                    <li>
                        <span>Black Clover - Anime</span>
                        <div class="acoes">
                            <button class="btn-remover">Remover</button>
                            <button class="btn-assistido">Assistido</button>
                        </div>
                    </li>
                </ul>
            </div>
        </section>
    </main>
    <footer>

    </footer>

    <script src="js/main.js"></script>
</body>

</html>
